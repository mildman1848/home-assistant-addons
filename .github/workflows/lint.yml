---
name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint
          python -m pip install --upgrade pip pytest
      - name: YAML lint
        run: yamllint .
      - name: Shellcheck
        run: |
          find . -type f \
            \( \
              -name '*.sh' \
              -o -path '*/rootfs/etc/services.d/*/run' \
              -o -path '*/rootfs/etc/cont-init.d/*' \
            \) \
            -print0 | xargs -0 -r shellcheck
      - name: Python tests
        run: pytest -q
