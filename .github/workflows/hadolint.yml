---
name: Hadolint

on:
  push:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '.hadolint.yaml'
      - '.github/workflows/hadolint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '.hadolint.yaml'
      - '.github/workflows/hadolint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dockerfile-lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - neolink/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          config: .hadolint.yaml
