---
name: Build Neolink Add-on Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - neolink/**
      - .github/workflows/build-neolink.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./neolink
          file: ./neolink/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-debian:bookworm
            BUILD_ARCH=${{ matrix.arch }}
            NEOLINK_VERSION=v0.6.2
          tags: ghcr.io/mildman1848/neolink-${{ matrix.arch }}:0.1.0
